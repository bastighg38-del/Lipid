<!DOCTYPE html>
<html lang="de">
<head>

</head>
<body>
   <div class="header">
  <a href="index.html" id="site2Btn" class="BTN">

</div>

    <form>

    
    <p class="Triglyceride-warning">Der Patient stellte sich zur Beurteilung einer Fettstoffwechselstörung vor.</p>
    <div id="trigWarnung" class="Triglyceride-warning" style="display:none;"> </div>
    <div id="Warnung2" class="Triglyceride-warning" style="display:none;"> </div>
 
     <button type="button" id="CopyBtn" class="BTN">
<svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 -960 960 960" fill="black">
    <path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-240v-480 480Z"/>

</button>


    </form>
    
    


</body>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const text1 = "Der Patient stellte sich zur Beurteilung einer Fettstoffwechselstörung vor.";
    let text2 = "";
    let text3 = "";


 
    const warnung = document.getElementById("trigWarnung");
    const warnung2 = document.getElementById("Warnung2");
    const copyBtn = document.getElementById("CopyBtn");
    const Gesamtcholesterin = parseFloat(localStorage.getItem("9Input"));
    const Triglyceride = parseFloat(localStorage.getItem("3Input"));
    const HDL_C = parseFloat(localStorage.getItem("7Input"));
    const NON_HDL = Gesamtcholesterin - HDL_C;
    const ApoB = parseFloat(localStorage.getItem("13Input"));  
    const LDL_C = Gesamtcholesterin - HDL_C - Triglyceride / 5;

  

 //berechnung Dysbetalipoproteinämie Warnung

if (
    (Triglyceride >= 150) &&
    ((NON_HDL / ApoB) >= 1.7) &&
    ((Triglyceride / ApoB) >= 1.35)
)
 {
        warnung2.innerHTML = 
        "Es könnte eine familiäre Dysbetalipoproteinämie vorliegen. <br>"+
        "Folgende Befunde liegen vor: <br>" +
        "Triglyceride = <u>" + Triglyceride + " mg/dl</u> UND <br>" + 
        "NON-HDL/ApoB-Quotient = <u>" + (NON_HDL / ApoB).toFixed(2) + " mg/dl</u> <br>" +
        "TG/ApoB-Quotient = <u>" + (Triglyceride /ApoB).toFixed(2) + " mg/dl</u> <br><br>" +
        "Die familiäre Dysbetalipoproteinämie (Typ III-Hyperlipidämie nach Fredrickson, autosomal-rezessiv, Häufigkeit ca. 1:2.000) geht auf eine Störung des Metabolismus von Chylomikronen und VLDL-Remnants zurück, deren Aufnahme in die Leber durch Apolipoprotein E (Apo E) vermittelt wird."+
        "<br>Remnants sind Abbauprodukte des plasmatischen Lipoprotein-Stoffwechsels und gehören zu den atherogensten Lipidpartikeln. Die betroffenen Patienten haben daher ein sehr hohes Gefäßrisiko (arterielle Verschlusskrankheit, KHK, Schlaganfall)." + 
        "<br>Häufig finden sich kutane oder tuberöse Xanthome, pathognomisch sind Handlinien-Xanthome." +
        "<br>Es wird eine genetische Apolipoprotein E-Typisierung empfohlen.";

        warnung2.style.display = "block";
        
        text3 =
        "\n\nEs könnte eine familiäre Dysbetalipoproteinämie vorliegen. \n"+
        "Folgende Befunde liegen vor: \n" +
        "Triglyceride = " + Triglyceride + " mg/dl UND \n" + 
        "NON-HDL/ApoB-Quotient = " + (NON_HDL / ApoB).toFixed(2) + " mg/dl \n" +
        "TG/ApoB-Quotient = " + (Triglyceride /ApoB).toFixed(2) + " mg/dl \n\n" +
        "Die familiäre Dysbetalipoproteinämie (Typ III-Hyperlipidämie nach Fredrickson, autosomal-rezessiv, Häufigkeit ca. 1:2.000) geht auf eine Störung des Metabolismus von Chylomikronen und VLDL-Remnants zurück, deren Aufnahme in die Leber durch Apolipoprotein E (Apo E) vermittelt wird."+
        "\nRemnants sind Abbauprodukte des plasmatischen Lipoprotein-Stoffwechsels und gehören zu den atherogensten Lipidpartikeln. Die betroffenen Patienten haben daher ein sehr hohes Gefäßrisiko (arterielle Verschlusskrankheit, KHK, Schlaganfall)." + 
        "\nHäufig finden sich kutane oder tuberöse Xanthome, pathognomisch sind Handlinien-Xanthome." +
        "\nEs wird eine genetische Apolipoprotein E-Typisierung empfohlen.";


    }
    else {
        warnung2.style.display = "none";
    }

    //berechnung Triglyceride Warnung
    if (!isNaN(Triglyceride) && Triglyceride >= 300) {
        warnung.innerHTML =
            "Bei einer Hypertriglyceridämie besteht das Risiko einer potentiell lebensbedrohlichen Pankreatitis. " +
            "Diese Erkrankung trat bisher nicht auf. Das Risiko ist ab Triglycerid-Werten von > 1000 mg/dl deutlich erhöht. " +
            "Die hier nüchtern erhobenen Werte lagen bei <u>" + Triglyceride + "</u> mg/dl. " +
            "Das kardiovaskuläre Risiko ist bei Hypertriglyceridämie allenfalls gering erhöht. " +
            "Ein Anhalt für eine sekundäre Genese habe ich nicht. <br> " + 
            "Die Therapie besteht in erster Linie aus einer Ernährungsberatung. "+
            "Diese ist bei uns erfolgt, ein Merkblatt wurde ausgehändigt. "+
            "Im Vordergrund steht die Reduktion von schnellen Kohlehydraten und nicht der Fette, die Reduktion des Alkoholkonsums und ein maßvoller Umgang mit Fleisch. " +
            "Über eine gesunde Lebensweise mit körperlicher Aktivität sowie Gewichtsreduktion wurde ebenfalls gesprochen. ";
            

        warnung.style.display = "block";

        text2 =
            "\n\nBei einer Hypertriglyceridämie besteht das Risiko einer potentiell lebensbedrohlichen Pankreatitis. " +
            "Diese Erkrankung trat bisher nicht auf. Das Risiko ist ab Triglycerid-Werten von > 1000 mg/dl deutlich erhöht. " +
            "Die hier nüchtern erhobenen Werte lagen bei <u>" + Triglyceride + "</u> mg/dl. " +
            "Das kardiovaskuläre Risiko ist bei Hypertriglyceridämie allenfalls gering erhöht. " +
            "Ein Anhalt für eine sekundäre Genese habe ich nicht. \n" + 
            "Die Therapie besteht in erster Linie aus einer Ernährungsberatung. "+
            "Diese ist bei uns erfolgt, ein Merkblatt wurde ausgehändigt. "+
            "Im Vordergrund steht die Reduktion von schnellen Kohlehydraten und nicht der Fette, die Reduktion des Alkoholkonsums und ein maßvoller Umgang mit Fleisch. " +
            "Über eine gesunde Lebensweise mit körperlicher Aktivität sowie Gewichtsreduktion wurde ebenfalls gesprochen. ";
    } else {
        warnung.style.display = "none";
    }

    copyBtn.addEventListener("click", () => {
       navigator.clipboard.writeText(text1 + text2 + text3)
            .then(() => {
                 alert("Text wurde kopiert!");
            })
            .catch(err => {
                 console.error("Fehler beim Kopieren:", err);
             });
    });

});
</script>


</html>
