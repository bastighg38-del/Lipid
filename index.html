<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weiterleitung</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;

        font-family: Arial, Helvetica, sans-serif;

        background: linear-gradient(135deg, #f8f9fb, #e9edf2);

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .page {
        width: 100%;
        max-width: 1100px;
        padding: 40px 25px;
      }

      /* LOGO */

      .logo-container {
        text-align: center;
        margin-bottom: 35px;
      }

      .logo {
        width: 512px;
        height: 512px;
        object-fit: contain;
        border-radius: 50%;
      }

      h1 {
        text-align: center;
        margin: 0 0 35px;

        font-size: 30px;
        font-weight: 600;
        color: #1c1c1c;
      }

      /* KARTEN */

      .cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
      }

      .card {
        background: white;

        border-radius: 20px;
        overflow: hidden;

        text-decoration: none;
        color: #222;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .card:hover {
        transform: translateY(-8px);

        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      }

      .card-image {
        width: 100%;
        height: 260px;

        object-fit: cover;
        display: block;
      }

      .card-content {
        padding: 25px;
        text-align: center;
      }

      .card-title {
        margin: 0;

        font-size: 24px;
        font-weight: 600;
      }

      .card-button {
        display: inline-block;

        margin-top: 15px;
        padding: 12px 25px;

        border-radius: 30px;

        background: #111;
        color: white;

        font-size: 15px;
      }

      /* MOBILE */

      @media (max-width: 700px) {
        .page {
          padding: 25px 18px;
        }

        .logo {
          width: 105px;
          height: 105px;
        }

        h1 {
          font-size: 24px;
        }

        .cards {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        .card-image {
          height: 220px;
        }
      }
    </style>
  </head>

  <body>
    <main class="page">
      <!-- LOGO -->

      <h1>Bitte wählen Sie eine Seite</h1>

      <section class="cards">
        <!-- LIPID -->
        <a class="card" href="Lipid/index.html" target="_self">
          <div class="logo-container">
            <img
              class="logo"
              src="Lipid/android-chrome-512x512.png"
              alt="Logo"
            />
          </div>

          <div class="card-content">
            <h2 class="card-title">Lipid</h2>

            <span class="card-button"> Öffnen </span>
          </div>
        </a>

        <!-- FASTTRACK CKD -->
        <a class="card" href="FastTrack_CKD/index.html" target="_self">
          <div class="logo-container">
            <img
              class="logo"
              src="FastTrack_CKD/logo_small_icon_only_inverted.png"
              alt="Logo"
            />
          </div>

          <div class="card-content">
            <h2 class="card-title">FastTrack CKD</h2>

            <span class="card-button"> Öffnen </span>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
