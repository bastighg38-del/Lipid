<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />

    <title>FastTrack CKD</title>

    <!-- CSS einbinden -->
    <link rel="stylesheet" href="../Lipid/styles.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="header">
      <h1>FastTrack CKD</h1>
      <button type="button" id="resetBtn" class="BTN">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24"
          width="24"
          viewBox="0 -960 960 960"
          fill="black"
        >
          <path
            d="M440-122q-121-15-200.5-105.5T160-440q0-66 26-126.5T260-672l57 57q-38 34-57.5 79T240-440q0 88 56 155.5T440-202v80Zm80 0v-80q87-16 143.5-83T720-440q0-100-70-170t-170-70h-3l44 44-56 56-140-140 140-140 56 56-44 44h3q134 0 227 93t93 227q0 121-79.5 211.5T520-122Z"
          />
        </svg>
      </button>
    </header>

    <form>
      <!-- GESCHLECHT -->

      <div class="dropdown-container">
        <b class="title">Geschlecht</b>

        <div class="custom-dropdown">
          <button class="dropdown-button" type="button">
            <span class="selected-option">Option auswählen</span>
            <span class="arrow">⌄</span>
          </button>

          <div class="dropdown-menu">
            <div class="dropdown-option" data-value="1">männlich</div>
            <div class="dropdown-option" data-value="0">weiblich</div>
          </div>
        </div>
      </div>

      <!-- ALTER -->

      <div class="umrechner last-input-centered">
        <label>
          <b class="title">Alter</b>
        </label>

        <div class="eingabefeld">
          <label class="einheit-label">Jahre</label>

          <input id="age" type="number" step="1" min="18" />
        </div>
      </div>

      <!-- KREATININ -->

      <div class="umrechner last-input-centered">
        <label>
          <b class="title">Kreatinin</b>
        </label>

        <div class="eingabefeld">
          <label class="einheit-label">mg/dl</label>

          <input id="creatinine" type="number" step="0.01" min="0.1" />
        </div>
      </div>

      <!-- BERECHNETE eGFR -->

      <div class="umrechner last-input-centered">
        <label>
          <b class="title">eGFR <br />(CKD-EPI)</b>
        </label>

        <div class="eingabefeld gray-input">
          <label class="einheit-label"> ml/min/1,73 m² </label>

          <input disabled id="egfr-result" type="number" />
        </div>
      </div>

      <!-- UACR -->

      <div class="umrechner last-input-centered">
        <label>
          <b class="title">UACR</b>
        </label>

        <div class="eingabefeld">
          <label class="einheit-label">mg/g</label>

          <input id="acr" type="number" step="any" min="0.1" />
        </div>
      </div>

      <!-- BUTTON -->

      <button type="button" id="calculate-button">Risiko berechnen</button>

      <!-- ERGEBNISSE -->

      <div class="results">
        <div class="boxcontainer">
          2-Jahres-Risiko:

          <strong id="risk2">—</strong>
        </div>

        <div class="boxcontainer">
          5-Jahres-Risiko:

          <strong id="risk5">—</strong>
        </div>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
  </body>
</html>
